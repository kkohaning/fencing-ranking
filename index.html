<script>
// ===== Constants =====
const DIVISIONS = {
  mf: { name: '남자 플뢰레', short: '남플' },
  wf: { name: '여자 플뢰레', short: '여플' },
  me: { name: '남자 에뻬', short: '남에' },
  we: { name: '여자 에뻬', short: '여에' },
  ms: { name: '남자 사브르', short: '남사' },
  ws: { name: '여자 사브르', short: '여사' },
};
const DIV_KEYS = Object.keys(DIVISIONS);

const TIER_INFO = {
  T1: { name: '협회장배 전국선수권', mult: 1.0, maxRank: 128 },
  T2: { name: '지역협회장배', mult: 0.6, maxRank: 64 },
  T3: { name: '사설대회', mult: 0.2, maxRank: 32 },
};

const TIER_PATTERNS = {
  T1: [
    /대한펜싱협회장배/,
  ],
  T2: [
    /(?:서울|부산|대구|인천|광주|대전|울산|세종)\s*특별시장(?:기|배)?/,
    /(?:서울|부산|대구|인천|광주|대전|울산|세종)\s*광역시장(?:기|배)?/,
    /(?:^|\s)특별시장(?:기|배)/,
    /(?:^|\s)광역시장(?:기|배)/,
    /도지사(?:기|배)/,
    /(?:^|\s)시장기(?:\s|$)/,
    /(?:서울|경기|부산|대전|인천|광주|대구|울산|세종|강원|충북|충남|전북|전남|경북|경남|제주)\s*(?:협회장배|협회기|협회장기|협회배)/,
    /(?:서울|경기|부산|대전|인천|광주|대구|울산|세종|강원|충북|충남|전북|전남|경북|경남|제주)\s*(?:특별)?(?:광역)?시\s*(?:협회|체육회|장기|장배)/,
    /지역\s*(?:협회|선수권)/,
    /도민\s*(?:체육|체전|선수권)/,
  ],
};

const STORAGE_KEY = 'fencing-ranking-state';
const STORAGE_VERSION = 1;

// PDF.js worker
if (window.pdfjsLib) {
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

// ===== State =====
const state = {
  tournaments: [],
  activeDivision: 'mf',
  importDraft: null,
  previousRankings: {},
  searchQuery: '',
  clubMappings: [], // [{ from: 'APEX', to: '에이펙스' }, ...]
};

// ===== Storage =====
async function loadState() {
  try {
    // 1순위: 같은 경로의 data.json (배포 환경 — 방문자·관리자 공통)
    const res = await fetch('./data.json').catch(() => null);
    if (res && res.ok) {
      const parsed = await res.json();
      if (parsed.tournaments) state.tournaments = parsed.tournaments;
      if (parsed.previousRankings) state.previousRankings = parsed.previousRankings;
      if (parsed.clubMappings) state.clubMappings = parsed.clubMappings;
      console.log('data.json 로드 완료');
      return;
    }
  } catch (e) { /* data.json 없음 — 아래로 진행 */ }

  try {
    // 2순위: localStorage (로컬 편집 환경)
    if (window.storage && window.storage.get) {
      const result = await window.storage.get(STORAGE_KEY);
      if (result && result.value) {
        const parsed = JSON.parse(result.value);
        if (parsed.tournaments) state.tournaments = parsed.tournaments;
        if (parsed.previousRankings) state.previousRankings = parsed.previousRankings;
        if (parsed.clubMappings) state.clubMappings = parsed.clubMappings;
      }
    } else {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (parsed.tournaments) state.tournaments = parsed.tournaments;
        if (parsed.previousRankings) state.previousRankings = parsed.previousRankings;
        if (parsed.clubMappings) state.clubMappings = parsed.clubMappings;
      }
    }
  } catch (e) {
    console.log('No saved state or load error:', e);
  }
}

async function saveState() {
  const data = JSON.stringify({
    version: STORAGE_VERSION,
    tournaments: state.tournaments,
    previousRankings: state.previousRankings,
    clubMappings: state.clubMappings,
  });
  try {
    if (window.storage && window.storage.set) {
      await window.storage.set(STORAGE_KEY, data);
    } else {
      localStorage.setItem(STORAGE_KEY, data);
    }
  } catch (e) {
    console.error('Save failed:', e);
    try { localStorage.setItem(STORAGE_KEY, data); } catch(_){}
  }
}

// ===== UI Helpers (replaces alert/confirm — sandboxed iframes block native dialogs) =====
function showToast(message, type = 'info', duration = 2500) {
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  document.body.appendChild(toast);
  // Trigger animation in next frame
  requestAnimationFrame(() => toast.classList.add('show'));
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 300);
  }, duration);
}

function customConfirm(message, { confirmText = '확인', cancelText = '취소', danger = false } = {}) {
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.className = 'confirm-overlay';
    overlay.innerHTML = `
      <div class="confirm-box">
        <div class="confirm-message"></div>
        <div class="confirm-actions">
          <button class="btn btn-ghost" data-action="cancel">${cancelText}</button>
          <button class="btn ${danger ? 'btn-primary' : 'btn-primary'}" data-action="confirm" style="${danger ? 'background:var(--accent);' : ''}">${confirmText}</button>
        </div>
      </div>
    `;
    overlay.querySelector('.confirm-message').textContent = message;
    document.body.appendChild(overlay);
    
    function cleanup(result) {
      overlay.remove();
      resolve(result);
    }
    overlay.addEventListener('click', e => {
      const action = e.target.dataset.action;
      if (action === 'confirm') cleanup(true);
      else if (action === 'cancel' || e.target === overlay) cleanup(false);
    });
    overlay.querySelector('[data-action="confirm"]').focus();
  });
}

function setFootStatus(message, type = 'info') {
  const statusEl = document.querySelector('.modal-foot-status');
  if (!statusEl) return;
  statusEl.textContent = message;
  statusEl.className = `modal-foot-status ${type}`;
}

function clearFieldErrors() {
  document.querySelectorAll('.field.error').forEach(f => f.classList.remove('error'));
}

// Capture current rankings snapshot before a state-changing action
// Normalize a tournament name for matching purposes (strip year, 제N회, whitespace, punctuation)
function normalizeTournamentName(name) {
  return (name || '')
    .replace(/^\d{4}\s*/, '')
    .replace(/^제\d+회\s*/, '')
    .replace(/[\s_·,\-—–\.\(\)]/g, '')
    .toLowerCase();
}

// Group active tournaments into "events" by (normalized name + date).
// Same tournament held on the same day (regardless of how many PDF files were uploaded)
// should be a single event for ranking-change purposes.
function getActiveEvents() {
  const active = getActiveTournaments();
  const groups = new Map();
  for (const t of active) {
    const normName = normalizeTournamentName(t.name);
    const key = `${normName}|${t.date}`;
    if (!groups.has(key)) {
      groups.set(key, { name: t.name, date: t.date, normName, tournaments: [] });
    }
    groups.get(key).tournaments.push(t);
  }
  return [...groups.values()].sort((a, b) => a.date.localeCompare(b.date));
}

// Cache for "previous rankings"
let _prevRankingsCache = null;
let _prevRankingsCacheKey = null;

// Compute "previous" rankings = state without the most recent EVENT (not file).
// "Most recent" = event with the latest date. All tournaments with the same (name,date) are
// treated as one event — so 6 separate division PDFs of the same tournament count as ONE event.
function getPreviousRankings() {
  const events = getActiveEvents();

  // Cache key includes all event tournament ids and their result counts
  const cacheKey = events.map(e =>
    `${e.normName}:${e.date}:[${e.tournaments.map(t =>
      `${t.id}#${DIV_KEYS.map(k => (t.results?.[k] || []).length).join(',')}`
    ).join(';')}]`
  ).join('|');
  if (cacheKey === _prevRankingsCacheKey) return _prevRankingsCache;

  if (events.length < 2) {
    _prevRankingsCache = null;
    _prevRankingsCacheKey = cacheKey;
    return null;
  }

  // Latest event = last after date sort. Previous = everything before it.
  const previousEvents = events.slice(0, -1);
  const previousTournaments = previousEvents.flatMap(e => e.tournaments);

  const result = {};
  DIV_KEYS.forEach(k => {
    const r = computeRanking(k, previousTournaments);
    result[k] = {};
    r.fencerScores.forEach(f => {
      if (f.eligible && f.finalRank != null) {
        result[k][f.key] = f.finalRank;
      }
    });
  });

  _prevRankingsCache = result;
  _prevRankingsCacheKey = cacheKey;
  return result;
}

// Snapshot is now derived from state — captureSnapshot is a no-op kept for compatibility
function captureSnapshot() {
  // Invalidate cache so next getPreviousRankings recomputes
  _prevRankingsCacheKey = null;
}

// Compute delta from previous (computed) rankings
function getDelta(divKey, fencerKey, currentRank) {
  const prev = getPreviousRankings();
  if (!prev) return null; // Need at least 2 distinct events
  const prevMap = prev[divKey] || {};
  const prevRank = prevMap[fencerKey];
  if (prevRank === undefined) return { type: 'new' };
  if (prevRank === currentRank) return { type: 'same' };
  if (prevRank > currentRank) return { type: 'up', delta: prevRank - currentRank };
  return { type: 'down', delta: currentRank - prevRank };
}

// ===== Score logic =====
function getRankScore(rank) {
  const n = Math.round(rank);
  if (n < 1) return 0;
  if (n === 1) return 32.0;
  if (n <= 2) return 26.0;
  if (n <= 4) return 26 - 3 * (n - 2);
  if (n <= 8) return 20 - 1.5 * (n - 4);
  if (n <= 16) return 14 - 0.75 * (n - 8);
  if (n <= 32) return 8 - 0.25 * (n - 16);
  if (n <= 64) return 4 - 0.0625 * (n - 32);
  if (n <= 128) return (192 - n) / 64;
  return 0;
}

function tierMultiplier(tier) {
  return TIER_INFO[tier]?.mult ?? 0;
}

function calcPoints(rank, tier) {
  return Math.round(getRankScore(rank) * tierMultiplier(tier) * 100) / 100;
}

// ===== Rolling window =====
function getActiveTournaments(source) {
  const list = source || state.tournaments;
  const now = Date.now();
  const yearAgo = now - 365 * 24 * 60 * 60 * 1000;
  const futureTolerance = 24 * 60 * 60 * 1000;

  // 1단계: 12개월 윈도우 필터
  const inWindow = list.filter(t => {
    const ts = new Date(t.date).getTime();
    return !isNaN(ts) && ts >= yearAgo && ts <= now + futureTolerance;
  }).sort((a, b) => new Date(a.date) - new Date(b.date));

  // 2단계: 시리즈 지정된 대회는 가장 최근 1개만 유효
  const seriesLatest = new Map(); // series -> latest date
  inWindow.forEach(t => {
    const s = (t.series || '').trim();
    if (!s) return;
    if (!seriesLatest.has(s) || t.date > seriesLatest.get(s)) {
      seriesLatest.set(s, t.date);
    }
  });

  return inWindow.filter(t => {
    const s = (t.series || '').trim();
    if (!s) return true; // 시리즈 미지정 → 12개월 윈도우 그대로
    return t.date === seriesLatest.get(s); // 시리즈 중 최신만
  });
}

function isInWindow(tournament) {
  const now = Date.now();
  const yearAgo = now - 365 * 24 * 60 * 60 * 1000;
  const futureTolerance = 24 * 60 * 60 * 1000;
  const ts = new Date(tournament.date).getTime();
  if (isNaN(ts)) return { inWindow: false, reason: 'invalid' };
  if (ts < yearAgo) return { inWindow: false, reason: 'expired' };
  if (ts > now + futureTolerance) return { inWindow: false, reason: 'future' };
  return { inWindow: true, reason: null };
}

// ===== Ranking calculation =====
function calculateFencerScore(results) {
  if (!results || results.length === 0) {
    return { points: 0, eligible: false, top4Ids: new Set(), reason: '결과 없음' };
  }
  const sorted = [...results].sort((a, b) => b.points - a.points);
  const naturalTop4 = sorted.slice(0, 4);
  const hasT1T2 = naturalTop4.some(r => r.tier === 'T1' || r.tier === 'T2');

  if (hasT1T2) {
    const sum = naturalTop4.reduce((s, r) => s + r.points, 0);
    return {
      points: Math.round(sum * 100) / 100,
      eligible: true,
      top4Ids: new Set(naturalTop4.map(r => r.tournamentId)),
      swapped: false,
    };
  }

  const bestT1T2 = sorted.find(r => r.tier === 'T1' || r.tier === 'T2');

  if (!bestT1T2) {
    const sum = naturalTop4.reduce((s, r) => s + r.points, 0);
    return {
      points: Math.round(sum * 100) / 100,
      eligible: false,
      top4Ids: new Set(naturalTop4.map(r => r.tournamentId)),
      reason: 'KFA 대회 (T1·T2) 미참가',
    };
  }

  let modifiedTop4;
  if (naturalTop4.length === 4) {
    modifiedTop4 = [...naturalTop4.slice(0, 3), bestT1T2];
  } else {
    modifiedTop4 = naturalTop4.some(r => r.tournamentId === bestT1T2.tournamentId)
      ? naturalTop4
      : [...naturalTop4, bestT1T2].slice(0, 4);
  }

  const sum = modifiedTop4.reduce((s, r) => s + r.points, 0);
  return {
    points: Math.round(sum * 100) / 100,
    eligible: true,
    top4Ids: new Set(modifiedTop4.map(r => r.tournamentId)),
    swapped: true,
  };
}

function computeRanking(divKey, source) {
  const activeTournaments = getActiveTournaments(source)
    .filter(t => t.results && t.results[divKey] && t.results[divKey].length > 0);

  const fencerMap = new Map();
  activeTournaments.forEach(t => {
    (t.results[divKey] || []).forEach(r => {
      if (!r.name || !r.rank) return;
      const points = calcPoints(r.rank, t.tier);
      const club = normalizeClubName(r.club || '');
      const result = {
        tournamentId: t.id,
        tournamentName: t.name,
        tournamentDate: t.date,
        tier: t.tier,
        rank: r.rank,
        points,
      };
      const key = makeFencerKey(r.name, club);
      if (!fencerMap.has(key)) {
        fencerMap.set(key, { displayName: r.name, displayClub: club, results: [] });
      }
      fencerMap.get(key).results.push(result);
    });
  });

  const fencerScores = [];
  fencerMap.forEach((data, key) => {
    const calc = calculateFencerScore(data.results);
    fencerScores.push({
      name: data.displayName,
      club: data.displayClub,
      key,
      ...calc,
      allResults: data.results,
    });
  });

  fencerScores.sort((a, b) => {
    if (a.eligible !== b.eligible) return a.eligible ? -1 : 1;
    return b.points - a.points;
  });

  let currentRank = 0;
  let lastPoints = null;
  fencerScores.forEach((f, i) => {
    if (!f.eligible) { f.finalRank = null; return; }
    if (f.points !== lastPoints) {
      currentRank = (fencerScores.slice(0, i).filter(x => x.eligible).length) + 1;
    }
    f.finalRank = currentRank;
    lastPoints = f.points;
  });

  return { tournaments: activeTournaments, fencerScores };
}

function normalizeName(s) {
  return (s || '').replace(/\s+/g, '').trim();
}

function normalizeClubName(club) {
  if (!club) return club;
  // 1단계: 공백 제거
  let result = club.replace(/\s+/g, '');
  // 2단계: 매핑 적용 (대소문자 무시)
  for (const m of state.clubMappings) {
    const from = (m.from || '').replace(/\s+/g, '');
    const to = (m.to || '').replace(/\s+/g, '');
    if (!from) continue;
    result = result.replace(new RegExp(from.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'), to);
  }
  return result;
}

function makeFencerKey(name, club) {
  return normalizeName(name) + '|' + normalizeName(club || '');
}

// ===== PDF parsing =====
async function extractPdfText(file) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const pages = [];
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    // Group items by approximate y position to reconstruct lines
    const items = content.items.map(it => ({
      str: it.str,
      x: it.transform[4],
      y: Math.round(it.transform[5]),
    }));
    const yMap = new Map();
    items.forEach(it => {
      const key = Math.round(it.y / 3) * 3;
      if (!yMap.has(key)) yMap.set(key, []);
      yMap.get(key).push(it);
    });
    const sortedY = [...yMap.keys()].sort((a, b) => b - a);
    const lines = sortedY.map(y => {
      return yMap.get(y).sort((a, b) => a.x - b.x).map(it => it.str).join(' ').replace(/\s+/g, ' ').trim();
    }).filter(s => s.length > 0);
    pages.push(lines.join('\n'));
  }
  return pages.join('\n\n');
}

function detectTier(name, text) {
  const combo = (name || '') + ' ' + (text || '');
  for (const p of TIER_PATTERNS.T1) {
    if (p.test(combo)) return 'T1';
  }
  for (const p of TIER_PATTERNS.T2) {
    if (p.test(combo)) return 'T2';
  }
  return 'T3';
}

function detectTournamentName(text) {
  const lines = text.split('\n').slice(0, 25).map(l => l.trim()).filter(l => l.length > 0);
  for (const l of lines) {
    if (l.length < 6) continue;
    if (l.includes('대회') || l.includes('선수권') || l.includes('협회장배')) {
      // Strip software watermarks that PDF.js sometimes merges into title line
      let cleaned = l
        .replace(/Document\s+Engarde/gi, '')
        .replace(/Engarde/gi, '')
        .replace(/[_·]+/g, ' ')
        .replace(/\s+/g, ' ')
        .replace(/^[\s,\-—–]+|[\s,\-—–]+$/g, '')
        .trim();

      // Reconstruct "제 회 ... NN ..." -> "제NN회 ..." (PDF.js extracts the number out of order)
      const reconMatch1 = cleaned.match(/^제\s+회\s+(.+?)\s+(\d+)\s*(.*)$/);
      if (reconMatch1) {
        cleaned = (`제${reconMatch1[2]}회 ${reconMatch1[1]} ${reconMatch1[3]}`).replace(/\s+/g, ' ').trim();
      } else {
        // "제 NN 회 ..." word order
        const reconMatch2 = cleaned.match(/^제\s+(\d+)\s+회\s+(.+)$/);
        if (reconMatch2) {
          cleaned = `제${reconMatch2[1]}회 ${reconMatch2[2]}`.replace(/\s+/g, ' ').trim();
        }
      }

      if (cleaned.length > 100) cleaned = cleaned.substring(0, 100);
      return cleaned;
    }
  }
  return lines[0] || '';
}

function detectDate(text) {
  // Priority 1: Range patterns like "2025.10.24 ~ 2025.10.26" or "2026.04.03~05" (tournament dates)
  const rangePatterns = [
    /(\d{4})[.\-/](\d{1,2})[.\-/](\d{1,2})\s*[~]\s*(?:\d{4}[.\-/])?\d{1,2}[.\-/]?\d{0,2}/,
    /(\d{4})\s*년\s*(\d{1,2})\s*월\s*(\d{1,2})\s*일\s*[~]\s*\d/,
  ];
  for (const p of rangePatterns) {
    const m = text.match(p);
    if (m) {
      const y = m[1], mo = m[2].padStart(2, '0'), d = m[3].padStart(2, '0');
      const yi = parseInt(y, 10), moi = parseInt(mo, 10), di = parseInt(d, 10);
      if (yi >= 2000 && yi <= 2100 && moi >= 1 && moi <= 12 && di >= 1 && di <= 31) {
        return `${y}-${mo}-${d}`;
      }
    }
  }

  // Priority 2: Line-by-line scan, skipping document-generation timestamps
  const patterns = [
    /(\d{4})\s*년\s*(\d{1,2})\s*월\s*(\d{1,2})\s*일?/,
    /(\d{4})[.\-/](\d{1,2})[.\-/](\d{1,2})/,
    /(\d{4})\s+(\d{1,2})\s+(\d{1,2})/,
  ];
  const lines = text.split('\n');
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (/Document\s+Engarde|Engarde/i.test(line)) continue;
    if (i > 0 && /Document\s+Engarde/i.test(lines[i - 1])) continue;
    if (/\d{1,2}:\d{2}:\d{2}/.test(line)) continue; // contains time-of-day
    for (const p of patterns) {
      const m = line.match(p);
      if (m) {
        const y = m[1], mo = m[2].padStart(2, '0'), d = m[3].padStart(2, '0');
        const yi = parseInt(y, 10), moi = parseInt(mo, 10), di = parseInt(d, 10);
        if (yi >= 2000 && yi <= 2100 && moi >= 1 && moi <= 12 && di >= 1 && di <= 31) {
          return `${y}-${mo}-${d}`;
        }
      }
    }
  }
  return '';
}

// Detect if a line is a division header. Returns { key, isAmateur } or null.
// Handles full forms (남자 플뢰레, 일반부 여자 에뻬) AND short forms (남일/여일/남중/남일엘리트)
// AND compact single-token forms (남일플, 여일에, 남일사, 여일사, etc.)
function detectDivisionInLine(line) {
  // Skip clearly result-like lines (start with rank digit + space)
  if (/^\d{1,3}\s/.test(line)) return null;
  // Skip lines that are too long (likely not headers)
  if (line.length > 60) return null;

  // ── Strategy A: compact form ─────────────────────────────────────
  // Pattern: [남/여][age][optional space][weapon-single-char]
  // Examples: 남일플, 여일에, 남일사, 여일사, 남중플, 여고에
  // 일엘리트 is also valid: 남일엘리트플
  const compactMatch = line.match(/([남여])(일(?:엘리트)?|중|고|초|대)\s*([플에사])(?:[\s_\-\(]|$)/);
  if (compactMatch) {
    const gender = compactMatch[1] === '남' ? 'm' : 'w';
    const age = compactMatch[2];       // 일, 중, 고, 초, 대, 일엘리트
    const weaponChar = compactMatch[3];
    const weapon = weaponChar === '플' ? 'f' : weaponChar === '에' ? 'e' : 's';
    const isAmateur = age === '일';    // only 일반부 counts (not 중/고/초/대 or 일엘리트)
    return { key: gender + weapon, isAmateur };
  }

  // ── Strategy B: full form ─────────────────────────────────────────
  // Weapon must be present as a recognizable word
  let weapon = null;
  if (/플(?:뢰|러|로)?\s*레|플뢰|플러|플로/.test(line)) weapon = 'f';
  else if (/에\s*[뻬빼페]/.test(line)) weapon = 'e';
  else if (/사\s*브\s*[르레]/.test(line)) weapon = 's';
  if (!weapon) return null;

  // Gender must be present
  let gender = null;
  if (/남자|남일|남중|남고|남초|남대/.test(line)) gender = 'm';
  else if (/여자|여일|여중|여고|여초|여대/.test(line)) gender = 'w';
  if (!gender) return null;

  // Amateur status: default true, override if non-amateur marker found
  let isAmateur = true;
  if (/엘리트/.test(line)) isAmateur = false;
  else if (/(?:^|\s)[남여](?:중|고|초)\s/.test(line)) isAmateur = false;
  else if (/^(?:남|여)?(?:중|고|초)\s/.test(line)) isAmateur = false;
  else if (/대학(?:부|생|교)/.test(line) && !/대학교\s*펜싱부?/.test(line)) isAmateur = false;
  else if (/전문선수|학생부|초등|중등|고등/.test(line)) isAmateur = false;

  return { key: gender + weapon, isAmateur };
}

// Split parsed PDF text into per-division sections, MERGING repeated divisions across pages
function splitByCategory(text) {
  const sectionMap = {}; // key -> { div, lines: [] }
  let currentDiv = null;
  let currentIsAmateur = false;
  let pendingLines = [];

  function flush() {
    if (currentDiv && currentIsAmateur && pendingLines.length > 0) {
      if (!sectionMap[currentDiv]) {
        sectionMap[currentDiv] = { div: currentDiv, lines: [] };
      }
      sectionMap[currentDiv].lines.push(...pendingLines);
    }
    pendingLines = [];
  }

  const lines = text.split('\n');
  for (const rawLine of lines) {
    const line = rawLine.trim();
    if (!line) continue;

    // Check division header first (more specific than result test)
    const divInfo = detectDivisionInLine(line);
    if (divInfo) {
      flush();
      currentDiv = divInfo.key;
      currentIsAmateur = divInfo.isAmateur;
      continue;
    }

    // Result line candidates: starts with rank
    if (/^\d{1,3}\s+/.test(line) || /^\d{1,3}위/.test(line)) {
      pendingLines.push(line);
    }
    // Other lines (titles, dates, column headers, footer) are ignored
  }
  flush();

  return Object.values(sectionMap);
}

// Parse rank/name/club result lines from a list. Handles:
// - Korean names (single token, multi-token like "왕 지아웨이")
// - English names (Edward XIao, OH DOO YONG, ACABADO RAPHAEL ALFONSO)
// - Mixed names (LEE, ALICE JIAE / CHUNG KUN-WEI)
// - Various delimiters after rank (위, ., :, ), etc.)
// - Club names with multiple words (이글펜싱클럽 전문트레이닝센터 올림픽점)
// - Footer noise filtering ("26. 4. 28. 오후 4:38 ...")
// - Tied positions (multiple 3위 entries)
function parseResultsLines(linesArray) {
  const out = [];
  const CLUB_INDICATORS = /(?:펜싱|FENCING|학교|대학교|아카데미|ACADEMY|센터|클럽|CLUB|협회|국대|FC|체육|체육관|문화체육|fencingwiki|FENCINGLAB|FENCINGWIKI|gard|garde)/i;

  for (const rawLine of linesArray) {
    const line = rawLine.trim();
    if (!line) continue;

    // Match rank + optional delimiter + rest
    const m = line.match(/^(\d{1,3})\s*(?:위|등|[\.\:\)\]\,\-\—\–▶→ㆍ·])?\s+(.+)$/);
    if (!m) continue;

    const rank = parseInt(m[1], 10);
    if (rank < 1 || rank > 256) continue;

    const rest = m[2].trim();
    const tokens = rest.split(/\s+/).filter(Boolean);
    if (tokens.length === 0) continue;

    let name = '', club = '';
    const firstTok = tokens[0];
    const firstIsKorean = /^[가-힣]{1,5}$/.test(firstTok);

    if (firstIsKorean) {
      // Strategy A: Korean name first
      // - 3+ char first token: just take that as name (most Korean names are 3 chars; 라팡트, 하이브 etc are clubs)
      // - 1-2 char first token: extend with consecutive Korean tokens (split surnames like "왕 지아웨이")
      if (firstTok.length >= 3) {
        name = firstTok;
        club = tokens.slice(1).join(' ').trim();
      } else {
        const nameParts = [firstTok];
        let i = 1;
        while (i < tokens.length) {
          if (CLUB_INDICATORS.test(tokens[i])) break;
          if (/^[가-힣]{1,5}$/.test(tokens[i])) {
            nameParts.push(tokens[i]);
            i++;
          } else {
            break;
          }
        }
        name = nameParts.join(' ');
        club = tokens.slice(i).join(' ').trim();
      }
    } else {
      // Strategy B: English/mixed first token. Find first Korean token OR club indicator (start of club).
      let nameEndIdx = -1;
      for (let i = 1; i < tokens.length; i++) {
        if (CLUB_INDICATORS.test(tokens[i]) || /[가-힣]/.test(tokens[i])) {
          nameEndIdx = i;
          break;
        }
      }
      if (nameEndIdx === -1) {
        // Pure non-Korean line; first token = name, rest = club
        name = firstTok;
        club = tokens.slice(1).join(' ').trim();
      } else {
        name = tokens.slice(0, nameEndIdx).join(' ').trim();
        // Stop club at stats-like tokens
        const clubTokens = [];
        for (let i = nameEndIdx; i < tokens.length; i++) {
          const tok = tokens[i];
          if (/^\d+(?:[승패점])/.test(tok)) break;
          if (/^[+\-]?\d+$/.test(tok)) break;
          clubTokens.push(tok);
        }
        club = clubTokens.join(' ').trim();
      }
    }

    // Validate name
    if (!/[가-힣A-Za-z]/.test(name)) continue;       // must have a letter
    if (/^\d+$/.test(name)) continue;                 // not pure digits
    if (/\d/.test(name)) continue;                    // no digits anywhere (catches footer junk)
    if (/[|\/]/.test(name)) continue;                 // no pipe/slash
    if (/:\d/.test(name)) continue;                   // no time-like patterns
    const nameTokens = name.split(/\s+/);
    if (nameTokens.length > 5) continue;              // too many tokens => junk

    // Clean
    name = name.replace(/^[\(\[\s,]+|[\)\]\s,]+$/g, '').trim();
    if (name.length > 30) name = name.substring(0, 30).trim();
    if (!name) continue;

    club = club.replace(/^[\s\(\[]+|[\s\?\:\-—–\)\]\(\[]+$/g, '').trim();
    // Strip trailing isolated junk tokens like "?" "( )" "_"
    club = club.replace(/\s*[\?\(\)\[\]_]+\s*$/g, '').trim();
    // Strip orphan parens/brackets/question marks anywhere — real club names don't have these
    club = club.replace(/[\(\)\[\]\?]/g, '').replace(/\s+/g, ' ').trim();
    if (club.length > 50) club = club.substring(0, 50).trim();

    out.push({ rank, name, club });
  }

  // Dedupe by (rank, name) — preserves tied positions
  const seen = new Set();
  const filtered = [];
  for (const r of out) {
    const key = r.rank + '|' + r.name;
    if (seen.has(key)) continue;
    seen.add(key);
    filtered.push(r);
  }
  return filtered.sort((a, b) => a.rank - b.rank);
}

// Parse plain text lines from textarea: "1 김민수\n2 이재윤..."
function parseManualResults(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  return parseResultsLines(lines);
}

// ===== Rendering =====

function renderDivisionNav() {
  const nav = document.getElementById('div-nav');
  nav.innerHTML = '';
  DIV_KEYS.forEach(key => {
    const btn = document.createElement('button');
    btn.className = 'div-tab' + (state.activeDivision === key ? ' active' : '');
    btn.dataset.div = key;
    const r = computeRanking(key);
    // Show total fencer count (eligible + DNR), not just eligible
    btn.innerHTML = `${DIVISIONS[key].name} <span class="count">${r.fencerScores.length}</span>`;
    btn.addEventListener('click', () => {
      state.activeDivision = key;
      renderDivisionNav();
      renderRanking();
      renderMostImproved();
      renderClubPoints();
      renderCurrentWinner();
    });
    nav.appendChild(btn);
  });
}

function fmtPts(v) {
  if (v == null || isNaN(v)) return '';
  return Number(v).toFixed(2).replace(/(\.\d*?)0+$/, '$1').replace(/\.$/, '');
}

// Abbreviate tournament name for compact column header display
function abbreviateName(name) {
  const n = name || '';
  if (/대한펜싱협회장배/.test(n)) return '대펜전국';
  if (/서울특별시장기|서울특별시장배/.test(n)) return '서울시장기';
  if (/경기도협회|경기(?:협회|도지사)/.test(n)) return '경기';
  if (/부산(?:광역시)?(?:협회|장기|장배)/.test(n)) return '부산';
  if (/대구(?:광역시)?(?:협회|장기|장배)/.test(n)) return '대구';
  if (/인천(?:광역시)?(?:협회|장기|장배)/.test(n)) return '인천';
  if (/광주(?:광역시)?(?:협회|장기|장배)/.test(n)) return '광주';
  if (/대전(?:광역시)?(?:협회|장기|장배)/.test(n)) return '대전';
  if (/울산(?:광역시)?(?:협회|장기|장배)/.test(n)) return '울산';
  if (/강원(?:특별자치도)?(?:협회|장기|장배)/.test(n)) return '강원';
  if (/충북|충청북도/.test(n)) return '충북';
  if (/충남|충청남도/.test(n)) return '충남';
  if (/전북|전라북도/.test(n)) return '전북';
  if (/전남|전라남도/.test(n)) return '전남';
  if (/경북|경상북도/.test(n)) return '경북';
  if (/경남|경상남도/.test(n)) return '경남';
  if (/제주(?:특별자치도)?/.test(n)) return '제주';
  if (/올림피언/.test(n)) return '올림피언';
  // Fallback: strip year/회 prefix and noise, take first ~5 chars
  const s = n
    .replace(/^\d{4}\s*/, '').replace(/^제\d+회\s*/, '')
    .replace(/(?:동호인|클럽|선수권|대회|겸|전문)/g, '')
    .replace(/\s+/g, '').trim();
  return s.substring(0, 5) || n.substring(0, 5);
}


function fmtDate(s) {
  if (!s) return '';
  const d = new Date(s);
  if (isNaN(d)) return s;
  return `'${String(d.getFullYear()).slice(2)}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

function fmtRank(r) {
  if (r === 1) return '1위';
  return `${r}위`;
}

function fmtDelta(delta) {
  if (!delta) return '';
  if (delta.type === 'new') return `<span class="delta new">신규</span>`;
  if (delta.type === 'same') return `<span class="delta same">—</span>`;
  if (delta.type === 'up') return `<span class="delta up"><span class="delta-arrow">▲</span>${delta.delta}</span>`;
  if (delta.type === 'down') return `<span class="delta down"><span class="delta-arrow">▼</span>${delta.delta}</span>`;
  return '';
}

function matchesSearch(f, query) {
  if (!query) return true;
  const q = query.toLowerCase().replace(/\s+/g, '');
  const nameNorm = (f.name || '').toLowerCase().replace(/\s+/g, '');
  const clubNorm = (f.club || '').toLowerCase().replace(/\s+/g, '');
  return nameNorm.includes(q) || clubNorm.includes(q);
}

function renderRanking() {
  const divKey = state.activeDivision;
  const { tournaments, fencerScores } = computeRanking(divKey);
  const container = document.getElementById('ranking-content');
  const meta = document.getElementById('ranking-meta');

  // === Diagnostic empty states ===
  if (tournaments.length === 0) {
    meta.textContent = '';
    
    // Case A: No tournaments at all
    if (state.tournaments.length === 0) {
      container.innerHTML = `
        <div class="empty">
          <div class="empty-title">아직 등록된 대회가 없습니다</div>
          <div class="empty-text">"대회 결과 추가" 버튼으로 첫 대회 데이터를 입력해보세요</div>
        </div>
      `;
      return;
    }
    
    // Case B: Tournaments exist but none in 12-month window
    const inWindowAll = getActiveTournaments();
    if (inWindowAll.length === 0) {
      const total = state.tournaments.length;
      const sample = state.tournaments
        .slice()
        .sort((a, b) => new Date(b.date) - new Date(a.date))
        .slice(0, 3);
      const sampleHtml = sample.map(t => 
        `<div style="font-size:12px;color:var(--ink-3);margin-top:4px;">• ${escapeHtml(t.name)} <span style="color:var(--ink-4);">(${t.date})</span></div>`
      ).join('');
      container.innerHTML = `
        <div class="empty">
          <div class="empty-title">12개월 윈도우 내 대회가 없습니다</div>
          <div class="empty-text">
            등록된 ${total}개 대회 모두 윈도우 밖이거나 미래 날짜입니다.<br>
            현재 기준일: ${new Date().toISOString().slice(0,10)} · 윈도우: ${new Date(Date.now() - 365*24*60*60*1000).toISOString().slice(0,10)} 이후
            ${sample.length ? '<div style="margin-top:10px;text-align:left;">최근 등록된 대회:' + sampleHtml + '</div>' : ''}
          </div>
        </div>
      `;
      return;
    }
    
    // Case C: Tournaments in window, but none for this specific division
    const divsWithData = DIV_KEYS.filter(k =>
      inWindowAll.some(t => t.results && t.results[k] && t.results[k].length > 0)
    );
    
    let helpHtml = '';
    if (divsWithData.length > 0) {
      const buttons = divsWithData.map(k => {
        const cnt = inWindowAll.reduce((s, t) => s + ((t.results[k] || []).length), 0);
        return `<button class="goto-div-btn" data-div="${k}">${DIVISIONS[k].name} <span class="goto-cnt">${cnt}</span></button>`;
      }).join('');
      helpHtml = `
        <div class="empty-text" style="margin-top:14px;">결과가 등록된 부문:</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:10px;">${buttons}</div>
      `;
    } else {
      // No division has any data — list empty tournaments with direct edit buttons
      const emptyTours = inWindowAll.filter(t =>
        !DIV_KEYS.some(k => t.results && t.results[k] && t.results[k].length > 0)
      );
      const tourButtons = emptyTours.map(t =>
        `<button class="goto-div-btn" data-tour="${t.id}">📝 ${escapeHtml(t.name)} 편집</button>`
      ).join('');
      helpHtml = `
        <div class="empty-text">
          PDF 자동 파싱이 결과를 추출하지 못했거나, 결과 입력 없이 저장된 상태입니다.<br>
          편집 버튼을 눌러 PDF 원본 텍스트를 확인하고 부문별 입력란에 직접 붙여넣어 주세요.
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;margin-top:14px;align-items:center;">
          ${tourButtons}
        </div>
      `;
    }
    
    container.innerHTML = `
      <div class="empty">
        <div class="empty-title">${DIVISIONS[divKey].name} 부문에 결과 없음</div>
        ${helpHtml}
      </div>
    `;
    
    // Wire up goto-division buttons
    container.querySelectorAll('.goto-div-btn[data-div]').forEach(b => {
      b.addEventListener('click', () => {
        state.activeDivision = b.dataset.div;
        renderDivisionNav();
        renderRanking();
      });
    });
    // Wire up edit-tournament buttons
    container.querySelectorAll('.goto-div-btn[data-tour]').forEach(b => {
      b.addEventListener('click', () => {
        const t = state.tournaments.find(x => x.id === b.dataset.tour);
        if (t) openImportModal(t);
      });
    });
    return;
  }

  const oldest = tournaments[0].date;
  const newest = tournaments[tournaments.length - 1].date;
  
  // Apply search filter
  const query = state.searchQuery || '';
  const filteredFencers = query ? fencerScores.filter(f => matchesSearch(f, query)) : fencerScores;
  
  if (query && filteredFencers.length === 0) {
    meta.textContent = `${oldest} ~ ${newest} · ${tournaments.length}개 대회`;
    container.innerHTML = `
      <div class="empty">
        <div class="empty-title">검색 결과 없음</div>
        <div class="empty-text">"${escapeHtml(query)}"에 해당하는 선수를 찾을 수 없습니다</div>
      </div>
    `;
    return;
  }

  // === Delta basis indicator: show which EVENT is the "after" reference ===
  let deltaInfo = '';
  const events = getActiveEvents();
  if (events.length < 2) {
    deltaInfo = ` · <span style="color:var(--ink-4);">순위변동: 2개 이상 대회 등록 시 표시</span>`;
  } else {
    const latest = events[events.length - 1];
    deltaInfo = ` · <span style="color:var(--ink-3);">변동 기준: <strong style="color:var(--ink-2);">${escapeHtml(abbreviateName(latest.name))}</strong> 추가 후</span>`;
  }

  if (query) {
    meta.innerHTML = `${filteredFencers.length}명 표시 / 전체 ${fencerScores.length}명 · ${tournaments.length}개 대회${deltaInfo}`;
  } else {
    meta.innerHTML = `${oldest} ~ ${newest} · ${tournaments.length}개 대회 · ${fencerScores.length}명${deltaInfo}`;
  }

  // === All-DNR warning banner ===
  const allDnr = fencerScores.length > 0 && fencerScores.every(f => !f.eligible);
  const dnrBanner = allDnr ? `
    <div class="info-note" style="margin-bottom: 12px; border-left-color: var(--warn);">
      <strong>모든 선수가 비랭킹 상태입니다.</strong> 등록된 대회에 KFA 공인(T1·T2) 결과가 없어 슬롯 규칙(T1·T2 1개 이상)을 충족하지 못합니다. T1 또는 T2 대회를 추가하면 랭킹이 활성화됩니다.
    </div>
  ` : '';

  // Build cross-table
  const isMobile = window.innerWidth <= 640;

  const tHeaders = tournaments.map(t => {
    return `
      <th title="${escapeHtml(t.name)}">
        <span class="th-cmp">${escapeHtml(abbreviateName(t.name))}</span>
        <span class="th-date">${fmtDate(t.date)}</span>
        <span class="tier-pill ${t.tier.toLowerCase()}">${t.tier.replace('T', 'Tier ')}</span>
      </th>
    `;
  }).join('');

  const rows = filteredFencers.map(f => {
    const cells = tournaments.map(t => {
      const r = f.allResults.find(x => x.tournamentId === t.id);
      if (!r) return `<td class="dnp">—</td>`;
      return `
        <td>
          <div class="cell-place">${fmtRank(r.rank)}</div>
          <div class="cell-pts">${fmtPts(r.points)}</div>
        </td>
      `;
    }).join('');

    let totalCells;
    if (f.eligible) {
      const delta = getDelta(divKey, f.key, f.finalRank);
      const deltaHtml = delta ? fmtDelta(delta) : '';
      totalCells = `
        <td class="total">${fmtPts(f.points)}</td>
        <td class="rank-final ${f.finalRank===1?'gold':''}">
          <div class="rank-cell">
            <span>${f.finalRank}</span>
            ${deltaHtml}
          </div>
        </td>
      `;
    } else {
      totalCells = `<td colspan="2" class="dnr-text">${escapeHtml(f.reason || '비랭킹')}</td>`;
    }

    const is1st = f.eligible && f.finalRank === 1;
    return `
      <tr class="${f.eligible ? '' : 'dnr-row'}">
        <td class="name">
          ${escapeHtml(f.name)}
          ${f.club ? `<div class="name-club">${escapeHtml(f.club)}</div>` : `<div class="name-club no-club">소속 미상</div>`}
        </td>
        ${isMobile ? totalCells + cells : cells + totalCells}
      </tr>
    `;
  }).join('');

  container.innerHTML = `
    ${dnrBanner}
    <div class="tbl-wrap">
      <table class="rt">
        <thead>
          <tr>
            <th>선수</th>
            ${isMobile ? '<th>총점</th><th>순위</th>' + tHeaders : tHeaders + '<th>총점</th><th>순위</th>'}
          </tr>
        </thead>
        <tbody>${rows || ''}</tbody>
      </table>
    </div>
  `;
}

function renderClubMappings() {
  const container = document.getElementById('club-mapping-list');
  if (!container) return;
  if (state.clubMappings.length === 0) {
    container.innerHTML = `<div class="aside-empty" style="padding:8px 0;">등록된 매핑 없음</div>`;
    return;
  }
  container.innerHTML = state.clubMappings.map((m, i) => `
    <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--line);">
      <input type="text" value="${escapeHtml(m.from)}" data-idx="${i}" data-field="from"
        style="flex:1;padding:6px 10px;border:1px solid var(--line-2);border-radius:5px;font-size:13px;"
        placeholder="원본 (예: APEX)">
      <span style="color:var(--ink-3);font-size:13px;">→</span>
      <input type="text" value="${escapeHtml(m.to)}" data-idx="${i}" data-field="to"
        style="flex:1;padding:6px 10px;border:1px solid var(--line-2);border-radius:5px;font-size:13px;"
        placeholder="통일명 (예: 에이펙스)">
      <button class="btn-ghost btn-danger" data-del="${i}" style="padding:4px 8px;font-size:12px;flex-shrink:0;">삭제</button>
    </div>
  `).join('');

  container.querySelectorAll('input').forEach(input => {
    input.addEventListener('input', async e => {
      const idx = parseInt(e.target.dataset.idx);
      const field = e.target.dataset.field;
      state.clubMappings[idx][field] = e.target.value;
      await saveState();
      _prevRankingsCacheKey = null;
    });
  });
  container.querySelectorAll('[data-del]').forEach(btn => {
    btn.addEventListener('click', async e => {
      const idx = parseInt(e.target.dataset.del);
      state.clubMappings.splice(idx, 1);
      await saveState();
      _prevRankingsCacheKey = null;
      renderClubMappings();
      renderAll();
    });
  });
}

function renderTournamentList() {
  const container = document.getElementById('tournament-list');
  if (!container) return; // No-op when DOM element absent (e.g. sidebar widget removed)
  const all = state.tournaments
    .slice()
    .sort((a, b) => new Date(b.date) - new Date(a.date));

  if (all.length === 0) {
    container.innerHTML = `<div class="empty-text" style="padding: 8px 0;">아직 등록된 대회가 없습니다</div>`;
    return;
  }

  container.innerHTML = all.map(t => {
    const total = DIV_KEYS.reduce((sum, k) => sum + ((t.results[k] || []).length), 0);
    const winStatus = isInWindow(t);
    let winBadge = '';
    if (!winStatus.inWindow) {
      const label = winStatus.reason === 'future' ? '미래 날짜' :
                    winStatus.reason === 'expired' ? '윈도우 밖' :
                    winStatus.reason === 'invalid' ? '날짜 오류' : '';
      winBadge = `<span style="font-size:10px;color:var(--warn);background:#FAEEDA;padding:1px 6px;border-radius:99px;font-weight:500;">${label}</span>`;
    }
    return `
      <div class="tour-item" data-id="${t.id}" style="${winStatus.inWindow ? '' : 'opacity:0.65;'}">
        <div class="tour-name">${escapeHtml(t.name)}</div>
        <div class="tour-meta">
          <span>${t.date}</span>
          <span class="tier-pill ${t.tier.toLowerCase()}">${t.tier.replace('T', 'Tier ')}</span>
          <span>${total}명</span>
          ${t.series ? `<span style="font-size:10px;color:var(--t2-color);background:var(--t2-bg);padding:1px 6px;border-radius:99px;font-weight:500;">${escapeHtml(t.series)}</span>` : ''}
          ${winBadge}
        </div>
        <div class="tour-actions">
          <button class="edit" data-id="${t.id}">편집</button>
          <button class="del" data-id="${t.id}">삭제</button>
        </div>
      </div>
    `;
  }).join('');

  container.querySelectorAll('.del').forEach(b => {
    b.addEventListener('click', async e => {
      const id = e.target.dataset.id;
      const t = state.tournaments.find(x => x.id === id);
      if (!t) return;
      const ok = await customConfirm(
        `'${t.name}' 대회를 삭제하시겠습니까?`,
        { confirmText: '삭제', danger: true }
      );
      if (ok) {
        captureSnapshot();
        state.tournaments = state.tournaments.filter(x => x.id !== id);
        await saveState();
        renderAll();
        showToast('대회가 삭제되었습니다', 'success');
      }
    });
  });
  container.querySelectorAll('.edit').forEach(b => {
    b.addEventListener('click', e => {
      const id = e.target.dataset.id;
      const t = state.tournaments.find(x => x.id === id);
      if (t) openImportModal(t);
    });
  });
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]
  );
}

// ===== Import flow =====

function openImportModal(existing) {
  state.importDraft = existing
    ? structuredClone(existing)
    : {
        id: 'tour_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
        name: '',
        date: new Date().toISOString().slice(0, 10),
        tier: 'T3',
        series: '',
        results: {},
        rawText: '',
      };
  // Edit mode goes straight to review; new entries start at drop step
  showImportStep(existing ? 'review' : 'drop');
  document.getElementById('modal').classList.add('open');
}

function closeImportModal() {
  document.getElementById('modal').classList.remove('open');
  state.importDraft = null;
}

function showImportStep(step) {
  const body = document.getElementById('modal-body');
  const foot = document.getElementById('modal-foot');
  const title = document.getElementById('modal-title');

  if (step === 'drop') {
    title.textContent = '대회 결과 추가 / 편집';
    body.innerHTML = `
      <div class="info-note">
        <strong>PDF 자동 파싱</strong>: PDF를 드롭하면 텍스트를 추출해 부문별로 자동 분류합니다. 
        초중고·전문 부문은 자동 제외되며, 결과는 검토 단계에서 직접 수정 가능합니다.
      </div>
      <div class="drop-zone" id="drop-zone">
        <span class="drop-icon">↓</span>
        <div class="drop-text">PDF 파일을 드래그하거나 클릭하세요</div>
        <div class="drop-sub">대회 결과가 담긴 PDF</div>
      </div>
      <div class="or-divider">또는</div>
      <div style="text-align: center;">
        <button class="btn btn-secondary" id="btn-manual">PDF 없이 직접 입력</button>
      </div>
      <div class="modal-tour-list-section">
        <h3>클럽 이름 통일 설정</h3>
        <div class="info-note" style="margin-bottom:12px;">공백은 자동으로 무시됩니다. 영문 토큰을 한글로 매핑하면 자동 치환됩니다.<br>예: <code>APEX</code> → <code>에이펙스</code>, <code>FENCING</code> → <code>펜싱</code></div>
        <div id="club-mapping-list"></div>
        <button class="btn btn-secondary" id="btn-add-mapping" style="margin-top:10px;font-size:13px;">+ 매핑 추가</button>
      </div>
      <div class="modal-tour-list-section">
        <h3>등록된 대회 목록</h3>
        <div id="tournament-list"></div>
      </div>
      <div class="modal-tour-list-section">
        <h3>클럽 이름 통일 설정</h3>
        <div class="info-note" style="margin-bottom:12px;">
          공백은 자동 무시됩니다. <strong>변환 전</strong>에 입력한 단어가 포함된 클럽명은 <strong>변환 후</strong>로 통일됩니다.<br>
          예: 변환 전 <code>APEX</code> → 변환 후 <code>에이펙스</code> 로 입력하면 <code>APEX FENCING CLUB</code>은 <code>에이펙스FENCINGCLUB</code>이 되고, <code>FENCING</code>→<code>펜싱</code>, <code>CLUB</code>→<code>클럽</code> 규칙도 추가하면 <code>에이펙스펜싱클럽</code>이 됩니다.
        </div>
        <div id="club-mapping-list"></div>
        <button class="btn btn-secondary" id="btn-add-mapping" style="margin-top:10px;font-size:13px;">+ 규칙 추가</button>
      </div>
    `;
    foot.innerHTML = `<button class="btn btn-ghost" id="btn-cancel">취소</button>`;

    // Wire up
    const dz = document.getElementById('drop-zone');
    dz.addEventListener('click', () => document.getElementById('file-input').click());
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragging'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('dragging'));
    dz.addEventListener('drop', async e => {
      e.preventDefault();
      dz.classList.remove('dragging');
      const file = e.dataTransfer.files[0];
      if (file && file.type === 'application/pdf') {
        await handlePdfFile(file);
      }
    });
    document.getElementById('btn-manual').addEventListener('click', () => showImportStep('review'));
    document.getElementById('btn-cancel').addEventListener('click', closeImportModal);
    renderTournamentList();
    renderClubMappings();
    document.getElementById('btn-add-mapping').addEventListener('click', async () => {
      state.clubMappings.push({ from: '', to: '' });
      await saveState();
      renderClubMappings();
    });
  } else if (step === 'review') {
    title.textContent = state.importDraft.name ? '결과 검토 — ' + state.importDraft.name : '결과 검토';
    body.innerHTML = renderReviewBody();
    foot.innerHTML = `
      <div class="modal-foot-status" id="save-status"></div>
      <div class="modal-foot-actions">
        <button class="btn btn-ghost" id="btn-cancel">취소</button>
        <button class="btn btn-secondary" id="btn-back">뒤로</button>
        <button class="btn btn-primary" id="btn-save">저장</button>
      </div>
    `;
    bindReviewEvents();
    document.getElementById('btn-cancel').addEventListener('click', closeImportModal);
    document.getElementById('btn-back').addEventListener('click', () => showImportStep('drop'));
    document.getElementById('btn-save').addEventListener('click', saveImport);
    updateSaveStatus();
  }
}

function updateSaveStatus() {
  if (!state.importDraft) return;
  const total = DIV_KEYS.reduce((s, k) => s + ((state.importDraft.results[k] || []).length), 0);
  const statusEl = document.getElementById('save-status');
  if (!statusEl) return;
  if (total === 0) {
    statusEl.textContent = '입력된 결과 없음 — 그래도 저장 가능';
    statusEl.className = 'modal-foot-status warn';
  } else {
    statusEl.textContent = `총 ${total}명 입력됨`;
    statusEl.className = 'modal-foot-status success';
  }
}

// Find existing tournament that matches the parsed PDF (same date + similar name)
// Used to auto-merge multi-file uploads of the same event (e.g. 협회장배 부문별 PDF들)
function findMatchingTournament(draft) {
  if (!draft.name || !draft.date) return null;
  const normName = normalizeTournamentName(draft.name);
  if (!normName) return null;
  return state.tournaments.find(t => {
    if (t.id === draft.id) return false;          // skip self
    if (t.date !== draft.date) return false;      // dates must match
    return normalizeTournamentName(t.name) === normName;
  });
}

async function handlePdfFile(file) {
  const dz = document.getElementById('drop-zone');
  dz.classList.add('parsing');
  dz.querySelector('.drop-text').textContent = 'PDF 분석 중...';
  dz.querySelector('.drop-sub').textContent = '';

  try {
    const text = await extractPdfText(file);
    state.importDraft.rawText = text;
    if (!state.importDraft.name) {
      state.importDraft.name = detectTournamentName(text) || '';
    }
    const detectedDate = detectDate(text);
    if (detectedDate) {
      state.importDraft.date = detectedDate;
    }
    state.importDraft.tier = detectTier(state.importDraft.name, text);

    // Auto-detect categories
    const sections = splitByCategory(text);
    const newResults = {};
    sections.forEach(s => {
      const parsed = parseResultsLines(s.lines);
      if (parsed.length > 0) {
        newResults[s.div] = parsed;
      }
    });
    state.importDraft.results = newResults;
    state.importDraft._newResults = JSON.parse(JSON.stringify(newResults));  // snapshot of just-this-PDF

    // ── Detect match with existing tournament → auto-merge ──
    const existing = findMatchingTournament(state.importDraft);
    if (existing) {
      state.importDraft.id = existing.id;        // becomes "edit" mode in saveImport
      state.importDraft.name = existing.name;    // keep existing canonical name
      state.importDraft.date = existing.date;
      state.importDraft.tier = existing.tier;

      // Merge results: existing first, then add new (dedupe by rank+name per division)
      const merged = JSON.parse(JSON.stringify(existing.results || {}));
      DIV_KEYS.forEach(div => {
        const incoming = newResults[div];
        if (!incoming || incoming.length === 0) return;
        const old = merged[div] || [];
        const seen = new Set();
        const combined = [...old, ...incoming].filter(r => {
          const k = r.rank + '|' + r.name;
          if (seen.has(k)) return false;
          seen.add(k);
          return true;
        }).sort((a, b) => a.rank - b.rank);
        merged[div] = combined;
      });
      state.importDraft.results = merged;
      state.importDraft._merged = true;
      state.importDraft._mergedFromName = existing.name;
    }

    showImportStep('review');
  } catch (e) {
    console.error('PDF parse failed:', e);
    showToast('PDF 파싱 실패 — 직접 입력 모드로 진행하세요', 'warn', 3500);
    showImportStep('review');
  }
}

function renderReviewBody() {
  const draft = state.importDraft;

  const divCards = DIV_KEYS.map(key => {
    const div = DIVISIONS[key];
    const results = draft.results[key] || [];
    const resultText = results.length
      ? results.map(r => `${r.rank} ${r.name}${r.club ? ' ' + r.club : ''}`).join('\n')
      : '';
    return `
      <div class="div-card">
        <div class="div-card-head">
          <span class="div-card-title">${div.name}</span>
          <span class="meta">${results.length > 0 ? results.length + '명' : '미입력'}</span>
        </div>
        <div class="div-card-body">
          <textarea class="div-results-input" data-div="${key}" placeholder="순위 이름 소속 (한 줄에 한 명, 소속은 선택)&#10;예시:&#10;1 김민수 서울펜싱클럽&#10;2 이재윤 (대전펜싱)&#10;3 박지훈">${escapeHtml(resultText)}</textarea>
          <div class="div-parsed" data-out="${key}"></div>
        </div>
      </div>
    `;
  }).join('');

  const totalParsed = DIV_KEYS.reduce((s, k) => s + ((draft.results[k] || []).length), 0);
  const hasRawText = !!draft.rawText;
  const parseFailed = hasRawText && totalParsed === 0;

  // Auto-expand raw text if parse failed
  const detailsAttrs = parseFailed ? 'open' : '';
  const showRaw = draft.rawText
    ? `<details ${detailsAttrs} style="margin-bottom: 20px;"><summary style="font-size:12px;color:var(--ink-3);cursor:pointer;padding: 6px 0;">PDF 원본 텍스트 보기</summary><div class="pdf-text-box">${escapeHtml(draft.rawText)}</div></details>`
    : '';

  // Big warning when parse failed
  const parseFailWarn = parseFailed ? `
    <div class="info-note" style="border-left-color: var(--warn); background: rgba(148, 70, 20, 0.06); margin-bottom: 16px;">
      <strong>⚠ PDF 자동 파싱 실패</strong> — 결과를 한 줄도 추출하지 못했습니다.<br>
      아래 "PDF 원본 텍스트 보기"가 자동으로 펼쳐져 있습니다. 거기서 결과 부분을 복사해 해당 부문 입력란에 붙여넣은 뒤,
      <strong>"순위 이름 소속"</strong> 형식으로 정리해주세요.
    </div>
  ` : '';

  // Auto-merge banner
  const mergeBanner = draft._merged ? `
    <div class="info-note" style="border-left-color: var(--used-mark); background: rgba(45,122,77,0.06); margin-bottom: 16px;">
      <strong>같은 대회로 자동 병합됩니다</strong> — 기존에 등록된 "${escapeHtml(draft._mergedFromName)}"에 이 PDF의 부문 결과가 추가됩니다.
      <button id="btn-unmerge" class="btn btn-ghost" style="margin-left:10px;padding:4px 10px;font-size:12px;">별도 대회로 등록</button>
    </div>
  ` : '';

  return `
    ${mergeBanner}
    <div class="form-grid">
      <div class="field">
        <label>대회명</label>
        <input type="text" id="f-name" value="${escapeHtml(draft.name)}" placeholder="예: 2025 대한펜싱협회장배 전국 동호인 선수권">
      </div>
      <div class="field">
        <label>개최일</label>
        <input type="date" id="f-date" value="${draft.date}">
      </div>
      <div class="field">
        <label>등급 (티어)</label>
        <select id="f-tier">
          <option value="T1" ${draft.tier==='T1'?'selected':''}>Tier 1 — 협회장배 전국선수권 (×1.00)</option>
          <option value="T2" ${draft.tier==='T2'?'selected':''}>Tier 2 — 지역협회장배 (×0.60)</option>
          <option value="T3" ${draft.tier==='T3'?'selected':''}>Tier 3 — 사설대회 (×0.2)</option>
        </select>
      </div>
    </div>
    <div class="form-grid cols-1" style="margin-bottom:24px;">
      <div class="field">
        <label>시리즈 이름 <span style="font-weight:400;color:var(--ink-4);">(선택)</span></label>
        <input type="text" id="f-series" value="${escapeHtml(draft.series || '')}" placeholder="예: 협회장배, 서울시장기 — 같은 시리즈 중 가장 최근 대회만 집계됩니다">
      </div>
    </div>

    ${parseFailWarn}
    ${showRaw}

    <div class="info-note">
      <strong>부문별 결과 입력</strong>: 한 줄에 한 명, "순위 이름 소속" 형식으로 입력하세요. 소속 정보는 동명이인 구분에 사용됩니다 (선택사항이지만 권장). 
      <strong>초중고·전문선수 부문은 입력하지 마세요.</strong>
    </div>

    ${divCards}
  `;
}

function bindReviewEvents() {
  // Live parse on textarea changes
  document.querySelectorAll('.div-results-input').forEach(ta => {
    const update = () => {
      const div = ta.dataset.div;
      const parsed = parseManualResults(ta.value);
      state.importDraft.results[div] = parsed;
      const out = document.querySelector(`[data-out="${div}"]`);
      if (out) {
        if (parsed.length === 0) {
          out.innerHTML = '';
        } else {
          const withClub = parsed.filter(r => r.club).length;
          const clubInfo = withClub === parsed.length 
            ? '<span style="color:var(--used-mark);">소속 모두 인식</span>'
            : withClub > 0 
              ? `소속 인식 ${withClub}/${parsed.length}`
              : '<span style="color:var(--warn);">소속 정보 없음</span>';
          out.innerHTML = `<span style="color:var(--used-mark);font-weight:500;">${parsed.length}명 인식</span> · 최저 ${parsed[parsed.length-1].rank}위까지 · ${clubInfo}`;
        }
      }
      // Update count in head
      const head = ta.closest('.div-card').querySelector('.meta');
      head.textContent = parsed.length > 0 ? parsed.length + '명' : '미입력';
      updateSaveStatus();
    };
    ta.addEventListener('input', update);
    update();
  });

  document.getElementById('f-name').addEventListener('input', e => {
    state.importDraft.name = e.target.value;
    e.target.closest('.field').classList.remove('error');
  });
  document.getElementById('f-date').addEventListener('input', e => {
    state.importDraft.date = e.target.value;
    e.target.closest('.field').classList.remove('error');
  });
  document.getElementById('f-tier').addEventListener('change', e => state.importDraft.tier = e.target.value);
  const seriesEl = document.getElementById('f-series');
  if (seriesEl) seriesEl.addEventListener('input', e => state.importDraft.series = e.target.value.trim());

  // Unmerge button: split this PDF off into a separate tournament
  const unmergeBtn = document.getElementById('btn-unmerge');
  if (unmergeBtn) {
    unmergeBtn.addEventListener('click', () => {
      const draft = state.importDraft;
      // Generate a fresh id, restore just-this-PDF's results, drop merge flags
      draft.id = 'tour_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
      draft.results = JSON.parse(JSON.stringify(draft._newResults || {}));
      delete draft._merged;
      delete draft._mergedFromName;
      // Make name distinguishable so it won't auto-merge again
      if (draft.name && !/\(2\)$/.test(draft.name)) {
        draft.name = draft.name + ' (2)';
      }
      showImportStep('review');
      showToast('별도 대회로 등록 모드 — 이름을 수정해 구분하세요', 'info', 3500);
    });
  }
}

async function saveImport() {
  const draft = state.importDraft;
  clearFieldErrors();

  if (!draft.name || !draft.name.trim()) {
    setFootStatus('대회명을 입력해주세요', 'error');
    const nameField = document.getElementById('f-name');
    if (nameField) {
      nameField.closest('.field').classList.add('error');
      nameField.focus();
    }
    return;
  }
  if (!draft.date) {
    setFootStatus('개최일을 선택해주세요', 'error');
    const dateField = document.getElementById('f-date');
    if (dateField) {
      dateField.closest('.field').classList.add('error');
      dateField.focus();
    }
    return;
  }

  // Trim raw text for storage size (keep up to 30KB for analysis purposes)
  if (draft.rawText && draft.rawText.length > 30000) {
    draft.rawText = draft.rawText.substring(0, 30000);
  }

  // Determine new vs edit BEFORE applying the change
  const idx = state.tournaments.findIndex(t => t.id === draft.id);
  const isEdit = idx >= 0;
  const isMerge = !!draft._merged;

  // Capture snapshot for genuinely-new ranking data:
  //  - Adding a brand-new tournament
  //  - Merging a new PDF into an existing tournament (new division/results added)
  // Do NOT capture for plain edits (name/club corrections), as that would erase ▲▼ history.
  if (!isEdit || isMerge) {
    captureSnapshot();
  }

  // Capture merge state for toast message before stripping flags
  const wasMerged = !!draft._merged;

  // Strip transient merge flags before persisting
  delete draft._merged;
  delete draft._mergedFromName;
  delete draft._newResults;

  // Apply change
  if (isEdit) {
    state.tournaments[idx] = draft;
  } else {
    state.tournaments.push(draft);
  }
  await saveState();
  closeImportModal();
  renderAll();

  // Build informative success toast
  const divsWithData = DIV_KEYS.filter(k => (draft.results[k] || []).length > 0);
  const winStatus = isInWindow(draft);
  
  if (!winStatus.inWindow) {
    const reason = winStatus.reason === 'future' ? '미래 날짜' : 
                   winStatus.reason === 'expired' ? '12개월보다 오래됨' : '날짜 형식 오류';
    showToast(`저장됨 — 단 윈도우 밖(${reason}) → 랭킹에 반영되지 않음`, 'warn', 4500);
  } else if (divsWithData.length === 0) {
    showToast('저장됨 — 단 결과 입력이 없음. 등록된 대회 목록의 편집 버튼으로 결과를 추가하세요', 'warn', 4500);
  } else {
    const divNames = divsWithData.map(k => DIVISIONS[k].short).join(', ');
    const total = divsWithData.reduce((s, k) => s + (draft.results[k] || []).length, 0);
    
    // If user is on a division that has no data, switch to the first one with data
    const action = wasMerged ? '병합' : (isEdit ? '수정' : '저장');
    if (!divsWithData.includes(state.activeDivision) && divsWithData.length > 0) {
      state.activeDivision = divsWithData[0];
      renderDivisionNav();
      renderRanking();
      showToast(`${action}됨 · ${divNames} (${total}명) · ${DIVISIONS[divsWithData[0]].name} 부문으로 이동`, 'success', 3500);
    } else {
      showToast(`${action}됨 · ${divNames} (${total}명)`, 'success');
    }
  }
}

// ===== Data export/import =====
function exportData() {
  const data = {
    version: STORAGE_VERSION,
    exportedAt: new Date().toISOString(),
    tournaments: state.tournaments,
    previousRankings: state.previousRankings,
    clubMappings: state.clubMappings,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `data.json`;
  a.click();
  URL.revokeObjectURL(url);
}

async function importData(file) {
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (!data.tournaments || !Array.isArray(data.tournaments)) {
      throw new Error('유효한 데이터 파일이 아닙니다.');
    }
    const ok = await customConfirm(
      `${data.tournaments.length}개 대회 데이터를 가져옵니다. 기존 데이터를 덮어쓰게 됩니다.`,
      { confirmText: '가져오기', danger: true }
    );
    if (!ok) return;
    captureSnapshot();
    state.tournaments = data.tournaments;
    if (data.previousRankings) state.previousRankings = data.previousRankings;
    await saveState();
    renderAll();
    showToast(`${data.tournaments.length}개 대회 데이터를 가져왔습니다`, 'success');
  } catch (e) {
    showToast('가져오기 실패: ' + e.message, 'error', 3500);
  }
}

// ===== Render orchestration =====
function renderClubPoints() {
  const el = document.getElementById('club-points-content');
  if (!el) return;
  const divKey = state.activeDivision;
  const { fencerScores } = computeRanking(divKey);

  // Aggregate eligible fencers' points by club
  const clubMap = {};
  for (const f of fencerScores) {
    if (!f.eligible || !f.club) continue;
    clubMap[f.club] = (clubMap[f.club] || 0) + f.points;
  }

  const top3 = Object.entries(clubMap)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 3);

  if (top3.length === 0) {
    el.innerHTML = `<div class="aside-empty">집계 데이터 없음</div>`;
    return;
  }

  const medals = ['🥇', '🥈', '🥉'];
  el.innerHTML = top3.map(([club, pts], i) => `
    <div class="club-rank-row">
      <span class="club-medal">${medals[i]}</span>
      <span class="club-name">${escapeHtml(club)}</span>
      <span class="club-pts">${fmtPts(pts)}</span>
    </div>
  `).join('');
}

function renderCurrentWinner() {
  const el = document.getElementById('current-winner-content');
  if (!el) return;
  const divKey = state.activeDivision;
  const active = getActiveTournaments().filter(t => t.results && t.results[divKey] && t.results[divKey].length > 0);
  if (active.length === 0) {
    el.innerHTML = `<div class="aside-empty">집계 데이터 없음</div>`;
    return;
  }

  const latest = active[active.length - 1];
  const results = (latest.results[divKey] || []).slice().sort((a, b) => a.rank - b.rank);

  // 1위, 2위, 공동3위 포함
  const podium = results.filter(r => r.rank <= 3);
  if (podium.length === 0) {
    el.innerHTML = `<div class="aside-empty">집계 데이터 없음</div>`;
    return;
  }

  const medals = { 1: '🥇', 2: '🥈', 3: '🥉' };

  el.innerHTML = `
    <div style="font-size:11px;color:var(--ink-3);margin-bottom:10px;">${escapeHtml(abbreviateName(latest.name))} · ${latest.date}</div>
    ${podium.map(r => `
      <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--line);">
        <span style="font-size:15px;flex-shrink:0;">${medals[r.rank] || '🥉'}</span>
        <div style="min-width:0;">
          <div style="font-size:13px;font-weight:500;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(r.name)}</div>
          ${r.club ? `<div style="font-size:11px;color:var(--ink-3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(r.club)}</div>` : ''}
        </div>
      </div>
    `).join('')}
  `;
}

function renderMostImproved() {
  const el = document.getElementById('most-improved-content');
  if (!el) return;
  const divKey = state.activeDivision;
  const { fencerScores } = computeRanking(divKey);

  let best = null, bestDelta = 0, bestRank = null;
  fencerScores.filter(f => f.eligible).forEach(f => {
    const delta = getDelta(divKey, f.key, f.finalRank);
    if (delta && delta.type === 'up' && delta.delta > bestDelta) {
      bestDelta = delta.delta;
      best = f;
      bestRank = f.finalRank;
    }
  });

  if (!best) {
    el.innerHTML = `<div class="aside-empty">${DIVISIONS[divKey].name} 부문 변동 없음</div>`;
    return;
  }

  el.innerHTML = `
    <div class="improved-card">
      <div class="improved-header">
        <span class="delta up"><span class="delta-arrow">▲</span>${bestDelta}</span>
      </div>
      <div class="improved-name">${escapeHtml(best.name)}</div>
      ${best.club ? `<div class="improved-club">${escapeHtml(best.club)}</div>` : ''}
      <div class="improved-rank">${bestRank}위 · ${fmtPts(best.points)}점</div>
    </div>
  `;
}

function renderUpcoming() {
  const el = document.getElementById('upcoming-content');
  if (!el) return;
  const today = new Date().toISOString().slice(0, 10);
  const upcoming = state.tournaments
    .filter(t => t.date > today)
    .sort((a, b) => a.date.localeCompare(b.date))
    .slice(0, 3);

  if (upcoming.length === 0) {
    el.innerHTML = `<div class="aside-empty">등록된 예정 대회 없음</div>`;
    return;
  }

  el.innerHTML = upcoming.map(t => {
    const daysLeft = Math.ceil((new Date(t.date) - new Date()) / (1000 * 60 * 60 * 24));
    const totalResults = DIV_KEYS.reduce((s, k) => s + ((t.results[k] || []).length), 0);
    return `
      <div class="upcoming-item">
        <div class="upcoming-top">
          <span class="tier-pill ${t.tier.toLowerCase()}">${t.tier.replace('T', 'Tier ')}</span>
          <span class="upcoming-days">D-${daysLeft}</span>
        </div>
        <div class="upcoming-name">${escapeHtml(t.name)}</div>
        <div class="upcoming-meta">${t.date}${totalResults ? ` · ${totalResults}명 입력됨` : ''}</div>
      </div>
    `;
  }).join('');
}

function renderAll() {
  renderDivisionNav();
  renderRanking();
  renderTournamentList();
  renderCurrentWinner();
  renderMostImproved();
  renderClubPoints();
  renderUpcoming();
}

// ===== Init =====
async function init() {
  await loadState();
  renderAll();

  // 화면 크기 변경 시 컬럼 순서 재렌더링
  let _resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(_resizeTimer);
    _resizeTimer = setTimeout(() => renderRanking(), 150);
  });

  document.getElementById('btn-import').addEventListener('click', () => openImportModal());
  document.getElementById('btn-close').addEventListener('click', closeImportModal);
  document.getElementById('modal-bg').addEventListener('click', closeImportModal);

  // Hidden file input for PDF (used inside import flow)
  document.getElementById('file-input').addEventListener('change', async e => {
    const file = e.target.files[0];
    if (file && file.type === 'application/pdf') {
      await handlePdfFile(file);
    }
    e.target.value = '';
  });

  // Export/Import data
  document.getElementById('btn-export').addEventListener('click', exportData);
  document.getElementById('btn-import-data').addEventListener('click', () => {
    document.getElementById('data-import-input').click();
  });
  document.getElementById('data-import-input').addEventListener('change', async e => {
    const file = e.target.files[0];
    if (file) await importData(file);
    e.target.value = '';
  });

  // Search input — debounced for performance
  let searchTimer = null;
  const searchInput = document.getElementById('search-input');
  searchInput.addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      state.searchQuery = e.target.value.trim();
      renderRanking();
    }, 120);
  });

  // ESC key closes modal or clears search
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (document.getElementById('modal').classList.contains('open')) {
        closeImportModal();
      } else if (state.searchQuery) {
        searchInput.value = '';
        state.searchQuery = '';
        renderRanking();
      }
    }
  });
}

init();
</script>
